<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">PIT CREW</h1>
    <div class="header__actions">
      <button class="header__btn" id="refresh-btn" title="Refresh data"><span class="header__btn-icon">↻</span></button>
      <button class="header__btn" id="theme-btn" title="Change team theme">🏎️</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tabs__btn tabs__btn--active" data-tab="calendar">Calendar</button>
    <button class="tabs__btn" data-tab="standings">Standings</button>
    <button class="tabs__btn" data-tab="results">Results</button>
  </nav>

  <main class="content">
    <section class="tab-panel tab-panel--active" id="panel-calendar"></section>
    <section class="tab-panel" id="panel-standings"></section>
    <section class="tab-panel" id="panel-results"></section>
  </main>

  <div class="theme-modal" id="theme-modal" hidden>
    <div class="theme-modal__backdrop"></div>
    <div class="theme-modal__body">
      <div class="theme-modal__header">
        <h2>Choose Team Theme</h2>
        <button class="mode-toggle" id="mode-switch" type="button">
          <span class="mode-toggle__icon">🌙</span>
          <span class="mode-toggle__icon">☀️</span>
          <span class="mode-toggle__thumb"></span>
        </button>
      </div>
      <div class="theme-modal__grid" id="theme-grid"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="../src/teams.js"></script>
  <script src="../src/themes.js"></script>
  <script src="../src/cache.js"></script>
  <script src="../src/toast.js"></script>
  <script src="../src/api.js"></script>
  <script src="../src/calendar.js"></script>
  <script src="../src/standings.js"></script>
  <script src="../src/results.js"></script>
  <script src="../src/refresh.js"></script>
  <script src="popup.js"></script>
</body>
</html>
